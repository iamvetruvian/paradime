<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paradime | Movies and TV Shows</title>
    <meta name="description" content="Paradime — stream movies and TV shows. Discover trending titles, browse by genre, and keep track of your watch history." />
    <link rel="preconnect" href="https://api.themoviedb.org" />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Fire all TMDB fetches immediately — before the JS bundle even loads -->
    <script>
      var _k = 'f29892040fcd94a66373b8170211ae55';
      var _b = 'https://api.themoviedb.org/3';
      window.__tmdb_trending  = fetch(_b + '/trending/all/day?api_key=' + _k).then(function(r){ return r.json(); });
      window.__tmdb_top_movies = fetch(_b + '/movie/top_rated?api_key=' + _k).then(function(r){ return r.json(); });
      window.__tmdb_top_tv    = fetch(_b + '/tv/top_rated?api_key=' + _k).then(function(r){ return r.json(); });
      window.__tmdb_classics  = fetch(_b + '/discover/movie?api_key=' + _k + '&sort_by=vote_average.desc&vote_count.gte=5000&primary_release_date.lte=1995-01-01').then(function(r){ return r.json(); });

      // As soon as we know the first hero image URL, inject a <link rel="preload"> so
      // the browser starts downloading it in parallel with the JS bundle.
      window.__tmdb_trending.then(function(data) {
        var item = data && data.results && data.results[0];
        if (item && item.backdrop_path) {
          var lo = document.createElement('link');
          lo.rel = 'preload'; lo.as = 'image';
          lo.href = 'https://image.tmdb.org/t/p/w300' + item.backdrop_path;
          document.head.appendChild(lo);

          var hi = document.createElement('link');
          hi.rel = 'preload'; hi.as = 'image';
          hi.href = 'https://image.tmdb.org/t/p/w1280' + item.backdrop_path;
          hi.setAttribute('fetchpriority', 'high');
          document.head.appendChild(hi);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://api.themoviedb.org" />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch History | Paradigm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/utils.css" />
    <link rel="stylesheet" href="/history.css" />
</head>

<body>
    <!-- Consistent Navbar styling -->
    <div class="navbar glass sticky-nav">
        <a class="navbar-brand" href="/">
            <img class="navbar-logo" src="/assets/logo.png" alt="" />
        </a>
        <form class="d-flex" role="search" action="/search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input class="form-control me-2 searchbar" type="search" placeholder="Search" aria-label="Search" />
            <button id="reset-button" class="btn btn-outline" type="reset">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </form>
        <button class="btn btn-outline login-btn" type="submit">
            <i class="fa-solid fa-circle-user"></i>
        </button>
    </div>

    <!-- History Container Layout -->
    <div class="container-fluid py-4 history-page-container">
        <div id="history-loading" class="text-center w-100 text-white mt-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Loading your viewing history...</p>
        </div>
        <div id="history-container" class="mt-3">
            <!-- Sections injected dynamically via JS -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <script src="/auth.js" defer></script>
    <script src="/history.js" defer></script>
    <script>
        const searchBar = document.querySelector(".searchbar");
        searchBar.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                const value = searchBar.value;
                if (value.length > 0) window.location = `/search?query=${value}`;
            }
        });
    </script>
</body>
</html>

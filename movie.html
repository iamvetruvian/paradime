<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Paradigm | Movies and Tv Shows</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        />
        <link rel="stylesheet" href="/search.css" />
        <link rel="stylesheet" href="/utils.css" />
        <link rel="stylesheet" href="/movie.css" />

        <link
            rel="shortcut icon"
            href="/assets/favicon.ico"
            type="image/x-icon"
        />
        <link rel="stylesheet" href="/actions.css" />
        <script>
            // Inline API optimization for faster image loading
            const _bearer = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJmMjk4OTIwNDBmY2Q5NGE2NjM3M2I4MTcwMjExYWU1NSIsIm5iZiI6MTc2ODUwMzk1NS45MjQsInN1YiI6IjY5NjkzYTkzOGYxN2U1Y2Q1YWE4ODJjYiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.wR22Ym0MqJmDhbQs_-fQXemdHTBr0JeIok07HcYSnzw";
            const _params = new URLSearchParams(window.location.search);
            const _id = _params.get("id");
            if (_id) {
                window.movieDataPromise = fetch(`https://api.themoviedb.org/3/movie/${_id}`, {
                    headers: { 'Authorization': `Bearer ${_bearer}` }
                }).then(r => r.json()).then(data => {
                    if (data.backdrop_path) {
                        const preload = document.createElement("link");
                        preload.rel = "preload";
                        preload.as = "image";
                        preload.href = `https://image.tmdb.org/t/p/original${data.backdrop_path}`;
                        preload.fetchpriority = "high";
                        document.head.appendChild(preload);
                    }
                    if (data.poster_path) {
                        const preloadP = document.createElement("link");
                        preloadP.rel = "preload";
                        preloadP.as = "image";
                        preloadP.href = `https://image.tmdb.org/t/p/original${data.poster_path}`;
                        preloadP.fetchpriority = "high";
                        document.head.appendChild(preloadP);
                    }
                    return data;
                }).catch(e => console.error("Inline prefetch error:", e));
            }
        </script>
</head>

    <body>
        <div class="navbar glass">
            <a class="navbar-brand" href="/">
                <img class="navbar-logo" src="/assets/logo.png" alt="" />
            </a>
            <form class="d-flex" role="search" action="/search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input
                    class="form-control me-2 searchbar"
                    type="search"
                    placeholder="Search"
                />
                <button class="btn btn-outline" type="reset">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </form>
            <button class="btn btn-outline login-btn">
                <i class="fa-solid fa-circle-user"></i>
            </button>
        </div>

        <div class="movie-info-container">
            <div class="top-banner-section">
                <div class="title"></div>
                <img class="backdrop-image" fetchpriority="high" />
                <div class="action-buttons-container">
                    <button class="btn btn-outline icon-btn" id="bookmark-btn" title="Bookmark">
                        <i class="fa-regular fa-bookmark"></i>
                    </button>
                    <button class="btn btn-outline icon-btn" id="watchlist-btn" title="Add to Watchlist">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="bottom-part">
                <div class="aside-poster-section">
                    <div class="large-poster-container loading" id="poster">
                        <img class="poster-image fade-in" fetchpriority="high" />
                    </div>
                    <button class="btn btn-primary watch-now-btn">
                        <i class="fa-solid fa-play"></i> Watch Now
                    </button>
                </div>

                <div class="movie-information-container">
                    <div class="lang-origin"></div>

                    <div class="genre-tags"></div>

                    <div
                        class="movie-stats"
                        style="
                            color: #ccc;
                            display: flex;
                            gap: 15px;
                            margin: 10px 5px;
                            font-size: 1.1em;
                        "
                    >
                        <span class="release-date"></span>
                        <span class="runtime"></span>
                        <span class="rating"></span>
                    </div>

                    <div
                        class="tagline"
                        style="
                            color: #aaa;
                            font-style: italic;
                            margin: 5px;
                            font-size: 1.2em;
                        "
                    ></div>

                    <div class="over-view">
                        <div class="section-title">
                            <div class="bar-style"></div>
                            Synopsis
                        </div>
                        <p></p>
                    </div>

                    <div class="Actors">
                        <div class="section-title">
                            <div class="bar-style"></div>
                            Cast
                        </div>
                        <div class="cast-card-container"></div>
                    </div>
                </div>
            </div>
            <section class="footer platter">
                <div>
                    Made with
                    <i class="fa-solid fa-heart" style="color: red"></i> by
                    Vetruvian
                </div>
                <div>
                    <i class="fa-solid fa-copyright"></i>2025-26. All Rights
                    Reserved
                </div>
            </section>
        </div>

        <script src="/movie.js"></script>
        <script src="/auth.js" defer></script>

        <!-- Watchlist Modal -->
        <div id='watchlist-modal' class='modal-overlay'>
            <div class='modal-content glass'>
                <div class='modal-header'>
                    <h3>Add to Watchlist</h3>
                    <button class='close-modal-btn' id='close-modal-btn'><i class='fa-solid fa-xmark'></i></button>
                </div>
                <div class='modal-body'>
                    <input type='text' id='watchlist-search' class='search-input' placeholder='Search watchlists...' style='width: 100%; margin-bottom: 15px; padding: 8px; border-radius: 5px; border: 1px solid #555; background: #222; color: white;'>
                    <div class='watchlists-container' id='watchlists-container'>
                        <!-- Mock watchlists -->
                        <label class='watchlist-item'><input type='checkbox' value='Favorites'> Favorites</label>
                        <label class='watchlist-item'><input type='checkbox' value='To Watch with Family'> To Watch with Family</label>
                        <label class='watchlist-item'><input type='checkbox' value='Sci-Fi Binges'> Sci-Fi Binges</label>
                        <label class='watchlist-item'><input type='checkbox' value='Action Movies'> Action Movies</label>
                        <label class='watchlist-item'><input type='checkbox' value='Comedy Nights'> Comedy Nights</label>
                    </div>
                </div>
                <div class='modal-footer'>
                    <button class='btn btn-outline create-watchlist-btn'><i class='fa-solid fa-plus'></i> New Watchlist</button>
                    <button class='btn btn-primary done-watchlist-btn' id='done-watchlist-btn'>Done</button>
                </div>
            </div>
        </div>

        <!-- Notification Toast -->
        <div id='toast-notification' class='toast-notification'></div>
    <script src="/actions.js" defer></script>
</body>
</html>

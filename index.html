<head>

    <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/utils.css" />
    <script>
        // Fetch trending movie immediately to start image download ASAP
        const TMDB_API_KEY = "f29892040fcd94a66373b8170211ae55";
        const heroFetchPromise = fetch(
            `https://api.themoviedb.org/3/trending/all/day?api_key=${TMDB_API_KEY}`,
        )
            .then((res) => res.json())
            .then((data) => {
                const items = data.results.slice(0, 5); // Get top 5 trending

                // Preload the first image aggressively
                if (items.length > 0) {
                    const firstBgUrl = `https://image.tmdb.org/t/p/w1280${items[0].backdrop_path}`;
                    const preload = document.createElement("link");
                    preload.rel = "preload";
                    preload.as = "image";
                    preload.href = firstBgUrl;
                    preload.fetchpriority = "high";
                    document.head.appendChild(preload);
                }

                return items;
            })
            .catch((err) => console.error("Hero fetch error:", err));
    </script>
</head>

<body>
    <section class="hero">
        <img class="hero-bg" id="hero-bg" alt="" style="background-color: #111;" fetchpriority="high" />
        <div class="navbar glass">
            <!-- <div class="container-fluid"> -->
            <a class="navbar-brand" href="/">

            </a>
            <!-- </div> -->
            <!-- <div class="container-fluid"> -->
            <form class="d-flex" role="search" action="/search">

                </button>
            </form>
            <button class="btn btn-outline login-btn" type="submit">

            </button>
            <!-- </div> -->
        </div>
        <!-- <input class="search-input" type="text" placeholder="Search for movies or TV shows..."> -->
        <div class="poster-info">
            <h1 class="poster-title" id="hero-title">Loading...</h1>
            <p class="poster-description" id="hero-desc"></p>
            <div class="poster-buttons">
                <button class="btn btn-primary watch-now-btn" id="hero-watch-btn">
                    <i class="fa-solid fa-play"></i> Watch Now
                </button>
                <button class="btn btn-secondary more-info-btn" id="hero-info-btn">
                    More Info
                </button>
            </div>
        </div>
        <div class="hero-slider-dots" id="hero-dots"></div>
    </section>
    <script>
        // Apply the fetched data to the hero section once DOM is ready
        heroFetchPromise.then((items) => {
            if (!items || items.length === 0) return;

            let currentIndex = 0;
            let slideInterval;
            const dotsContainer = document.getElementById("hero-dots");
            const heroBg = document.getElementById("hero-bg");
            const heroTitle = document.getElementById("hero-title");
            const heroDesc = document.getElementById("hero-desc");
            const watchBtn = document.getElementById("hero-watch-btn");
            const infoBtn = document.getElementById("hero-info-btn");

            // Create dots
            items.forEach((_, index) => {
                const dot = document.createElement("div");
                dot.className = "dot" + (index === 0 ? " active" : "");
                dot.onclick = () => {
                    currentIndex = index;
                    updateSlide();
                    resetInterval();
                };
                dotsContainer.appendChild(dot);
            });

            function updateSlide() {
                const item = items[currentIndex];
                const lowResUrl = `https://image.tmdb.org/t/p/w300${item.backdrop_path}`;
                const highResUrl = `https://image.tmdb.org/t/p/w1280${item.backdrop_path}`;

                // Fade/blur effect start
                heroBg.style.transition = "opacity 0.2s, filter 0.2s";
                heroBg.style.opacity = 0.5;
                heroBg.style.filter = "blur(10px)";
                
                setTimeout(() => {
                    heroBg.src = lowResUrl;
                    heroBg.style.opacity = 1;
                    
                    // High res progressive load
                    const img = new Image();
                    img.src = highResUrl;
                    img.onload = () => {
                        // Check if we haven't changed slide while loading
                        if (items[currentIndex] === item) {
                            heroBg.src = highResUrl;
                            heroBg.style.filter = "none";
                        }
                    };
                }, 200);

                heroTitle.textContent = item.title || item.name;

                let desc = item.overview || "";
                if (desc.length > 250)
                    desc = desc.substring(0, 250) + "...";
                heroDesc.textContent = desc;

                const mediaType =
                    item.media_type || (item.title ? "movie" : "tv");

                watchBtn.onclick = () => {
                    if (mediaType === "tv") {
                        window.location.href = `/play?type=${mediaType}&id=${item.id}&s=1&e=1`;
                    } else {
                        window.location.href = `/play?type=${mediaType}&id=${item.id}`;
                    }
                };
                infoBtn.onclick = () =>
                    (window.location.href = `/page?type=${mediaType}&id=${item.id}`);

                // Update dots
                Array.from(dotsContainer.children).forEach((dot, i) => {
                    dot.className =
                        "dot" + (i === currentIndex ? " active" : "");
                });
            }

            function nextSlide() {
                currentIndex = (currentIndex + 1) % items.length;
                updateSlide();
            }

            function resetInterval() {
                clearInterval(slideInterval);
                slideInterval = setInterval(nextSlide, 5000);
            }

            // Initialize first slide and interval
            updateSlide();
            slideInterval = setInterval(nextSlide, 5000);
        });
    </script>
